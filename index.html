<body>
  
  <div class="page-header"></div>
  <div id="cont2">

    <div class="heart">
        TINY SYNTH</div>

    <button id="recordings-dropdown">Creations</button>


    <div id="recordings-btn" style="display:none;">
      <div class="recording-status" id="recording-status"></div>
      <ul class="recordings-list" id="recordings-list"></ul>


    </div> 
    
    <canvas id="waveform" ></canvas>     

    
    <div class="button-group" id="stop"> 
      <div class="rec-mic-wrap">
        <button id="mic">MIC </button>
        <button id="record">REC</button>



</div></div>
   <div class="controls">
    <div id="volume-wrap">
      <label for="volume-control">VOLUME</label>
      <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.3">

      <label for="pitch-control">PITCH</label>

    </div>

    <div id="sound-selection">
    

      <button id="sound-sine">"JUMP"</button>

      <button id="sound-triangle">"READY"</button>
      <button id="sound-sawtooth">"FALL"</button>
     
 

</div>
</div> 

</div>
</div>
</div>
<script>

var AudioContext = window.AudioContext || window.webkitAudioContext;
const context = new AudioContext();

const masterVolume = context.createGain();
masterVolume.connect(context.destination);

const analyser = context.createAnalyser();
analyser.fftSize = 2048;
masterVolume.connect(analyser);

const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

const recordButton = document.querySelector('#record');
const stopButton = document.querySelector('#stop');
const volumeControl = document.querySelector('#volume-control');
const recordingStatus = document.querySelector('#recording-status');
const recordingsList = document.querySelector('#recordings-list');

let isRecording = false;
let mediaRecorder;
let audioChunks = [];
let recordings = [];
let oscillators = {};

volumeControl.addEventListener('input', function () {
  masterVolume.gain.value = this.value;
});

// 🎚 pitch control
document.querySelector('#pitch-control').addEventListener('input', function () {
  const pitchValue = parseFloat(this.value);
  Object.values(oscillators).forEach(osc => {
    osc.frequency.setValueAtTime(440 * pitchValue, context.currentTime);
  });
});

// 🔊 oscillator toggle
function toggleOscillator(type) {
  if (oscillators[type]) {
    oscillators[type].stop();
    oscillators[type].disconnect();
    delete oscillators[type];
  } else {
    let oscillator = context.createOscillator();
    oscillator.type = type;
    oscillator.frequency.setValueAtTime(440, context.currentTime);
    oscillator.connect(masterVolume);
    oscillator.start();
    oscillators[type] = oscillator;
  }
}

document.getElementById('sound-sine').onclick = () => toggleOscillator('sine');
document.getElementById('sound-square').onclick = () => toggleOscillator('square');
document.getElementById('sound-triangle').onclick = () => toggleOscillator('triangle');
document.getElementById('sound-sawtooth').onclick = () => toggleOscillator('sawtooth');

// ⏺ record toggle
recordButton.addEventListener('click', function () {
  if (isRecording) {
    mediaRecorder.stop();
    recordingStatus.textContent = 'Recording stopped.';
    recordButton.textContent = 'REC';
  } else {
    startRecording();
    recordButton.textContent = 'STOP';
  }
  isRecording = !isRecording;
});

// 🎙 start recording
function startRecording() {
  audioChunks = [];

  const destination = context.createMediaStreamDestination();
  masterVolume.connect(destination);

  mediaRecorder = new MediaRecorder(destination.stream);

  mediaRecorder.ondataavailable = function (event) {
    audioChunks.push(event.data);
  };

  mediaRecorder.onstop = function () {
    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
    const audioUrl = URL.createObjectURL(audioBlob);

    const audio = new Audio(audioUrl);
    recordings.push(audio);

    const listItem = document.createElement('li');
    listItem.style.display = 'flex';
    listItem.style.alignItems = 'center';
    listItem.style.gap = '5px';

    const index = recordings.length;

    // ▶️ play
    const playButton = document.createElement('button');
    playButton.textContent = 'Play';
    playButton.classList.add('ui-btn');
    playButton.onclick = () => audio.play();

    // ⬇ download
    const downloadLink = document.createElement('a');
    downloadLink.href = audioUrl;
    downloadLink.download = `Recording_${index}.wav`;
    downloadLink.textContent = `Download ${index} `;
    downloadLink.classList.add('ui-btn');

    listItem.appendChild(playButton);
    listItem.appendChild(downloadLink);
    recordingsList.appendChild(listItem);

    recordingStatus.textContent = 'Recording saved.';
  };

  mediaRecorder.start();
  recordingStatus.textContent = 'Recording...';
}

// 🛑 stop all oscillators
stopButton.onclick = () => {
  Object.values(oscillators).forEach(osc => {
    osc.stop();
    osc.disconnect();
  });
  oscillators = {};
};

// 🎤 mic input
const micButton = document.querySelector("#mic");
let micStream;
let micSource;

micButton.onclick = async function () {
  if (!micStream) {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micSource = context.createMediaStreamSource(micStream);
    micSource.connect(masterVolume);
    micButton.textContent = "OFF";
  } else {
    micStream.getTracks().forEach(track => track.stop());
    if (micSource) micSource.disconnect();
    micStream = null;
    micSource = null;
    micButton.textContent = "MIC";
  }
};

// 📈 waveform
const canvas = document.getElementById("waveform");
const canvasCtx = canvas.getContext("2d");

function drawWave() {
  requestAnimationFrame(drawWave);

  analyser.getByteTimeDomainData(dataArray);

  canvasCtx.fillStyle = "yellow";
  canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

  canvasCtx.strokeStyle = "hotpink";
  canvasCtx.lineWidth = 2;
  canvasCtx.shadowColor = "purple";
  canvasCtx.shadowBlur = 3;

  canvasCtx.beginPath();

  const sliceWidth = canvas.width / bufferLength;
  let x = 0;

  for (let i = 0; i < bufferLength; i++) {
    const v = dataArray[i] / 128.0;
    const y = v * canvas.height / 2;

    if (i === 0) {
      canvasCtx.moveTo(x, y);
    } else {
      canvasCtx.lineTo(x, y);
    }

    x += sliceWidth;
  }

  canvasCtx.lineTo(canvas.width, canvas.height / 2);
  canvasCtx.stroke();
}

drawWave();

// 📂 recordings dropdown
const recordingsBtn = document.getElementById('recordings-btn');
const recordingsDropdown = document.getElementById('recordings-dropdown');

recordingsDropdown.onclick = () => {
  recordingsBtn.style.display =
    recordingsBtn.style.display === 'none' ? 'block' : 'none';
};

// 🔊 resume audio context on interaction
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    if (context.state === 'suspended') {
      context.resume();
    }
  });
});
</script>
